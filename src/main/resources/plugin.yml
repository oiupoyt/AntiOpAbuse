name: AntiOpAbuse
version: '1.3.1'
main: dev.antiopabuse.antiopabuse.AntiOpAbusePlugin
api-version: '1.13'
description: Forwards server console output to a Discord webhook in real time.
authors: [AntiOpAbuse]
load: STARTUP

commands:
  antiopabuse:
    description: AntiOpAbuse management command (OP only)
    usage: /antiopabuse <webhook|reload>
    aliases: [aoa]
  abalogs:
    description: View the last 50 commands and creative interactions
    usage: /abalogs
